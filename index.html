<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>John Boelee Art Studio</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: fixed;
  left: 5vw;
  bottom: 5vh;
  z-index: 10;
}

.name {
  font-size: clamp(28px, 5vw, 65px);
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height: 1;
}

.sub {
  font-size: clamp(10px, 2vw, 16px);
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-top: 8px;
  opacity: 0.8;
}

/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100svh;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* TEXT */
.text {
  padding: clamp(25px, 5vw, 60px);
  text-align: center;
  background: black;
}

.text p {
  max-width: 900px;
  margin: 0 auto;
  font-size: clamp(16px, 2vw, 30px);
  line-height: 1.7;
  letter-spacing: 1.5px;
  opacity: 0.85;
}

/* =========================
   ARTWORK SYSTEM (FIXED HEIGHT)
========================= */

.artwork {
  padding: 0;
  background: black;
  height: 700px; /* Vaste hoogte voor alle artwork secties */
  overflow: hidden;
  position: relative;
}

/* ART 2 + ART 3 → FLEX ROW */
.artwork--rightbg,
.artwork--full {
  display: flex;
  align-items: center; /* Verticaal centreren */
  height: 700px; /* Vaste hoogte */
}

/* =========================
   BASE IMAGE (NO CROPPING)
========================= */

.artwork img {
  height: 100%; /* Neemt de volledige hoogte van de sectie in beslag */
  width: auto; /* Behoudt de natuurlijke breedte-verhouding */
  object-fit: contain; /* Zorgt ervoor dat de afbeelding niet wordt uitgerekt */
  display: block;
  margin: 0 auto; /* Centreren van de afbeelding */
}

/* =========================
   ART 2 (IMAGE LEFT + GREY RIGHT)
========================= */

.artwork--rightbg img {
  width: 70%; /* Breedte van de afbeelding */
}

.artwork--rightpanel {
  background: #d9d9d9;
  width: 30%;
  height: 100%;
  padding: 20px;
  display: flex;
  align-items: flex-end;
}

.artwork--rightpanel .title {
  color: black;
  margin: 0;
}

/* =========================
   ART 3 (GREY LEFT + IMAGE RIGHT)
========================= */

.artwork--leftbg {
  background: #d9d9d9;
  width: 40%;
  height: 100%;
  padding: 20px;
  display: flex;
  align-items: flex-end;
}

.artwork--full img {
  width: 60%; /* Breedte van de afbeelding */
}

/* TITLE */
.title {
  margin-top: 15px;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0.85;
}

.artwork--leftbg .title {
  color: black;
  margin: 0;
}

/* =========================
   MOBILE
========================= */

@media (max-width: 768px) {
  .artwork {
    height: auto; /* Laat de hoogte zich aanpassen op mobiel */
  }

  .artwork--rightbg,
  .artwork--full {
    display: block;
    height: auto;
  }

  .artwork img {
    width: 100%;
    height: auto;
  }

  .artwork--leftbg,
  .artwork--rightpanel {
    width: 100%;
    height: auto;
    background: transparent;
    padding: 0;
  }

  .artwork--leftbg .title,
  .artwork--rightpanel .title {
    color: white;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="name">JOHN BOELEE</div>
  <div class="sub">CONTEMPORARY ART</div>
</div>

<!-- HERO -->
<section class="hero">
  <img src="john-boelee-art-01.jpg">
  <div class="overlay"></div>
</section>

<!-- TEXT -->
<section class="text">
  <p>
    I am drawn to the moment when certainty begins to dissolve.
    The work moves within the tension between what we know,
    what we see, and what we experience.
  </p>
</section>

<!-- ART 2 -->
<section class="artwork artwork--rightbg">
  <img src="john-boelee-art-02.jpg">
  <div class="artwork--rightpanel">
    <div class="title">LION WATCHING BACK · 1993</div>
  </div>
</section>

<!-- TEXT 2 -->
<section class="text">
  <p></p>
</section>

<!-- ART 3 -->
<section class="artwork artwork--full">
  <div class="artwork--leftbg">
    <div class="title">LAYERS OF ABSENCE · 2025</div>
  </div>
  <img src="john-boelee-art-03.jpg">
</section>

</body>
</html>
