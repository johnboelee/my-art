<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">

<title>John Boelee Art Studio</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* 👉 naam blijft altijd zichtbaar */
.header {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
  font-size: 65px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* 👉 elk kunstwerk = full screen */
.work {
  height: 100vh;
  width: 100vw;
}

.work img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 👉 tekstvlakken */
.text {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  font-size: 16px;
  letter-spacing: 2px;
  opacity: 0.85;
}
</style>
</head>

<body>

<!-- 👉 vaste naam -->
<div class="header">JOHN BOELEE</div>

<!-- 👉 1e beeld (landing / hero) -->
<section class="work">
  <img src="john-boelee-art-01.jpg">
</section>

<!-- 👉 scroll: tweede werk -->
<section class="work">
  <img src="john-boelee-art-02.jpg">
</section>

<!-- 👉 tekstvlak -->
<section class="text">
  Contemporary Art Practice<br>
  The Netherlands
</section>

<!-- 👉 derde werk -->
<section class="work">
  <img src="john-boelee-art-03.jpg">
</section>

</body>
</html>
