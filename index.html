<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>John Boelee Art Studio</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header {
  position: fixed;
  left: 5vw;
  bottom: 5vh;
  z-index: 1000;
}

.name {
  font-size: 65px;
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height: 1;
}

.sub {
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-top: 8px;
  opacity: 0.8;
}

/* SECTIONS */
.work {
  position: relative;
  height: 100vh;
  height: 100svh;
  width: 100vw;
  background: black;

  display: flex;
  align-items: center;
  justify-content: center;

  overflow: hidden;

  /* fade-in basis */
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

/* active state (scroll effect) */
.work.visible {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGES */
.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.artwork img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* OVERLAY HERO */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* TITLE */
.title {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0.85;
}

/* TEXT BLOCKS */
.text {
  min-height: 35vh;
  background: black;

  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  padding: 40px;
  font-size: 30px;
  letter-spacing: 2px;
  line-height: 1.7;
  opacity: 0.9;
}

/* DESKTOP */
@media (min-width: 1024px) {
  .text {
    font-size: 18px;
  }
}

/* MOBILE */
@media (max-width: 768px) {
  .text {
    font-size: 18px;
    padding: 25px;
  }

  .name {
    font-size: 32px;
  }

  .sub {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="name">JOHN BOELEE</div>
  <div class="sub">CONTEMPORARY ART</div>
</div>

<!-- HERO -->
<section class="work hero">
  <img src="john-boelee-art-01.jpg">
  <div class="overlay"></div>
</section>

<!-- TEXT -->
<section class="text">
  I am drawn to the moment when certainty begins to dissolve.
  The work moves within the tension between what we know,
  what we see, and what we experience.
</section>

<!-- ART 2 -->
<section class="work artwork">
  <img src="john-boelee-art-02.jpg">

  <div class="title">
    LION WATCHING BACK · 1993
  </div>
</section>

<!-- TEXT -->
<section class="text">
  Contemporary Art Practice<br>
  Based in The Netherlands
</section>

<!-- ART 3 -->
<section class="work artwork">
  <img src="john-boelee-art-03.jpg">
</section>

<script>
/* scroll fade-in observer */
const sections = document.querySelectorAll('.work');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, {
  threshold: 0.2
});

sections.forEach(sec => observer.observe(sec));
</script>

</body>
</html>
