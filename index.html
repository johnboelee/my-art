<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>John Boelee Art Studio</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: fixed;
  left: 5vw;
  bottom: 5vh;
  z-index: 10;
}

.name {
  font-size: clamp(28px, 5vw, 65px);
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height: 1;
}

.sub {
  font-size: clamp(10px, 2vw, 16px);
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-top: 8px;
  opacity: 0.8;
}

/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100svh;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* TEXT */
.text {
  padding: clamp(25px, 5vw, 60px);
  text-align: center;
  background: black;
}

.text p {
  max-width: 900px;
  margin: 0 auto;

  font-size: clamp(16px, 2vw, 30px);
  line-height: 1.7;
  letter-spacing: 1.5px;
  opacity: 0.85;
}

/* =========================
   ARTWORK SYSTEM (FLUID)
========================= */

.artwork {
  padding: clamp(25px, 5vw, 60px);
  background: black;
}

/* basis image */
.artwork img {
  width: clamp(320px, 90vw, 1000px);
  height: auto;
  display: block;
}

/* CENTER (default) */
.artwork img {
  margin: 0 auto;
}

/* RIGHT aligned version */
.artwork--right {
  display: flex;
  justify-content: flex-end;
}

.artwork--right img {
  margin: 0;
}

/* FULL EDGE-TO-EDGE RIGHT (jouw foto 3) */
.artwork--full {
  display: flex;
  justify-content: flex-end;
  background: #d9d9d9;
  padding: 0;
}

.artwork--full img {
  width: clamp(320px, 60vw, 1000px);
  margin: 0;
}

/* title */
.title {
  margin-top: 15px;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0.85;
}

.artwork--full .title {
  color: black;
  padding: 10px 20px 20px 20px;
}

/* MOBILE (automatisch alles normal) */
@media (max-width: 768px) {

  .artwork--right,
  .artwork--full {
    display: block;
    background: transparent;
  }

  .artwork img {
    width: 100%;
  }

  .artwork--full .title {
    color: white;
    padding: 0;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="name">JOHN BOELEE</div>
  <div class="sub">CONTEMPORARY ART</div>
</div>

<!-- HERO -->
<section class="hero">
  <img src="john-boelee-art-01.jpg">
  <div class="overlay"></div>
</section>

<!-- TEXT -->
<section class="text">
  <p>
    I am drawn to the moment when certainty begins to dissolve.
    The work moves within the tension between what we know,
    what we see, and what we experience.
  </p>
</section>

<!-- ART 2 (center) -->
<section class="artwork">
  <img src="john-boelee-art-02.jpg">
  <div class="title">LION WATCHING BACK · 1993</div>
</section>

<!-- ART 3 (RIGHT EDGE + GREY WALL LEFT) -->
<section class="artwork artwork--full">
  <img src="john-boelee-art-03.jpg">
  <div class="title">LAYERS OF ABSENCE · 2025</div>
</section>

</body>
</html>
