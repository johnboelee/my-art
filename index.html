<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">

<title>John Boelee Art Studio</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

/* 👉 FIXED HEADER */
.header {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 1000;
}

.name {
  font-size: 65px;
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height: 1;
}

.sub {
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-top: 8px;
  opacity: 0.8;
}

/* 👉 FULLSCREEN SECTIONS */
.work {
  position: relative;
  height: 100vh;
  width: 100vw;
}

/* 👉 IMAGE */
.work img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 👉 DARK OVERLAY (TERUG!) */
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

/* 👉 TEXT SECTIONS */
.text {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  font-size: 18px;
  letter-spacing: 2px;
  opacity: 0.85;
}
</style>
</head>

<body>

<!-- 👉 HEADER TERUG -->
<div class="header">
  <div class="name">JOHN BOELEE</div>
  <div class="sub">CONTEMPORARY ART</div>
</div>

<!-- 👉 1e werk -->
<section class="work">
  <img src="john-boelee-art-01.jpg">
  <div class="overlay"></div>
</section>

<!-- 👉 2e werk -->
<section class="work">
  <img src="john-boelee-art-02.jpg">
  <div class="overlay"></div>
</section>

<!-- 👉 tekst -->
<section class="text">
  Contemporary Art Practice<br>
  Based in The Netherlands
</section>

<!-- 👉 3e werk -->
<section class="work">
  <img src="john-boelee-art-03.jpg">
  <div class="overlay"></div>
</section>

</body>
</html>
