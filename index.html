<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>John Boelee Art Studio</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: fixed;
  left: 5vw;
  bottom: 5vh;
  z-index: 10;
}

.name {
  font-size: clamp(28px, 5vw, 65px);
  text-transform: uppercase;
  letter-spacing: 2px;
  line-height: 1;
}

.sub {
  font-size: clamp(10px, 2vw, 16px);
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-top: 8px;
  opacity: 0.8;
}

/* HERO */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100svh;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* TEXT */
.text {
  padding: clamp(25px, 5vw, 60px);
  text-align: center;
  background: black;
}

.text p {
  max-width: 900px;
  margin: 0 auto;

  font-size: clamp(16px, 2vw, 30px);
  line-height: 1.7;
  letter-spacing: 1.5px;
  opacity: 0.85;
}

/* =========================
   ARTWORK SYSTEM
========================= */

.artwork {
  padding: clamp(25px, 5vw, 60px);
  background: black;
}

/* BASE IMAGE */
.artwork img {
  width: clamp(320px, 90vw, 1000px);
  height: auto;
  display: block;
  margin: 0 auto;
}

/* =========================
   ART 2 (IMAGE LEFT + GREY RIGHT)
========================= */

.artwork--rightbg {
  display: flex;
  padding: 0;
}

/* IMAGE LINKS */
.artwork--rightbg img {
  width: clamp(320px, 60vw, 1450px);
  margin: 0;
  display: block;
}

/* GRIJS VLAK RECHTS */
.artwork--rightpanel {
  background: #d9d9d9;
  width: 100%;
  padding: 20px;
  display: flex;
  align-items: flex-end;
}

/* TITLE IN GREY */
.artwork--rightpanel .title {
  color: black;
  margin: 0;
}

/* =========================
   ART 3 (RIGHT + GREY LEFT WALL)
========================= */

.artwork--full {
  display: flex;
  padding: 0;
}

/* LINKS GRAY AREA */
.artwork--leftbg {
  background: #d9d9d9;
  width: 100%;
  padding: 20px;
  display: flex;
  align-items: flex-end;
}

/* RIGHT IMAGE */
.artwork--full img {
  width: clamp(320px, 60vw, 900px);
  margin: 0;
  display: block;
}

/* TITLE */
.title {
  margin-top: 15px;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0.85;
}

/* TITLE ON GREY */
.artwork--leftbg .title {
  color: black;
  margin: 0;
}

/* =========================
   MOBILE
========================= */

@media (max-width: 768px) {

  .artwork--rightbg,
  .artwork--full {
    display: block;
  }

  .artwork img {
    width: 100%;
  }

  .artwork--leftbg,
  .artwork--rightpanel {
    background: transparent;
    padding: 0;
  }

  .artwork--leftbg .title,
  .artwork--rightpanel .title {
    color: white;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="name">JOHN BOELEE</div>
  <div class="sub">CONTEMPORARY ART</div>
</div>

<!-- HERO -->
<section class="hero">
  <img src="john-boelee-art-01.jpg">
  <div class="overlay"></div>
</section>

<!-- TEXT -->
<section class="text">
  <p>
    I am drawn to the moment when certainty begins to dissolve.
    The work moves within the tension between what we know,
    what we see, and what we experience.
  </p>
</section>

<!-- ART 2 (IMAGE LEFT + GREY RIGHT) -->
<section class="artwork artwork--rightbg">

  <img src="john-boelee-art-02.jpg">

  <div class="artwork--rightpanel">
    <div class="title">LION WATCHING BACK · 1993</div>
  </div>

</section>

<!-- TEXT 2 -->
<section class="text">
  <p></p>
</section>

<!-- ART 3 (RIGHT + GREY LEFT WALL) -->
<section class="artwork artwork--full">

  <div class="artwork--leftbg">
    <div class="title">LAYERS OF ABSENCE · 2025</div>
  </div>

  <img src="john-boelee-art-03.jpg">

</section>

</body>
</html>
