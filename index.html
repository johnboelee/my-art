<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <title>John Boelee Art Studio</title>

  <meta name="description" content="Original artworks by John Boelee">

  <style>
    body {
      margin: 0;
      background: black;
    }

    /* 👉 wrapper voor image + overlay */
    .image-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 👉 donkere laag over de foto */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    /* 👉 header container */
    .header {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* 👉 naam */
    .name {
      font-size: 65px;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
      opacity: 0.9;
    }

    /* 👉 subtitel */
    .sub {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 8px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- 👉 HEADER -->
  <div class="header">
    <div class="name">JOHN BOELEE</div>
    <div class="sub">CONTEMPORARY ART</div>
  </div>

  <!-- 👉 IMAGE -->
  <div class="image-wrapper">
    <img src="john-boelee-art-01.jpg" alt="Art">
    <div class="overlay"></div>
  </div>

</body>
</html>
