<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">

  <title>John Boelee Art Studio</title>

  <meta name="description" content="Original artworks by John Boelee">

  <style>
    body {
      margin: 0;
      background: black;
    }

    /* 👉 wrapper voor image + overlay */
    .image-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 👉 donkere laag over de foto */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35); /* pas hier donkerte aan */
    }

    /* 👉 jouw naam */
    .header {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 75px;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 1000;
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="header">JOHN BOELEE</div>

  <!-- 👉 NIEUW: wrapper + overlay -->
  <div class="image-wrapper">
    <img src="john-boelee-art-01.jpg" alt="Art">
    <div class="overlay"></div>
  </div>

</body>
</html>
